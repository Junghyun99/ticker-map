name: Update KOSPI Master Data

on:
  workflow_dispatch: # 수동으로 워크플로우를 실행할 수 있는 버튼 활성화
  
permissions:
  contents: write # GITHUB_TOKEN에 커밋/푸시 권한 부여

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      # 1. 저장소 코드 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 파이썬 환경 설정
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 원하는 파이썬 버전 지정 (3.8 이상 권장)

      # 3. 필요 라이브러리 설치
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip        
          pip install -r requirements.txt;

      # 4. 파이썬 스크립트 실행
      - name: Run kospi downloader
        run: python -m src.core.logic.kospi_code

      # 5. 생성된 엑셀 파일을 저장소에 커밋 및 푸시
      - name: Commit and push changes
        run: |
          # Git 봇 계정 설정
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 엑셀 파일 추가
          git add data/kospi_code.xlsx

          # 변경 사항이 있는 경우에만 커밋 (에러 방지)
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update KOSPI master data (Excel)"
            git push
            echo "Successfully updated and pushed data/kospi_code.xlsx"
          else
            echo "No changes detected in KOSPI data."
          fi
