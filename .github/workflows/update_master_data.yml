name: Update Master Data and Tickers DB

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run end-to-end ETL (download 5 exchanges + build tickers.db)
        run: python -m src.main

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/*.xlsx tickers.db

          if ! git diff --staged --quiet; then
            git commit -m "Auto-update master data and tickers.db"
            git push
            echo "Successfully updated 5-exchange master xlsx and tickers.db"
          else
            echo "No changes detected."
          fi
